name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate syntax
        run: python -m py_compile ai_generator.py bot.py credentials.py linkedin_publisher.py parser.py poll.py
