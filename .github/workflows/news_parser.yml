name: Daily News Parser

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # ← вбиває job якщо висить більше 5 хвилин

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Telegram connection
        run: |
          python3 -c "
          import requests, os
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat  = os.environ['TELEGRAM_CHAT_ID']
          r = requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            json={'chat_id': chat, 'text': '✅ GitHub Actions: connected, starting parser...'},
            timeout=10
          )
          print('Telegram:', r.status_code, r.text[:200])
          "
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Test RSS feeds
        run: |
          python3 -c "
          import feedparser
          feeds = [
            ('Hacker News', 'https://hnrss.org/frontpage'),
            ('Krebs',       'https://krebsonsecurity.com/feed/'),
          ]
          for name, url in feeds:
            f = feedparser.parse(url)
            print(f'{name}: {len(f.entries)} entries')
          "

      - name: Run parser
        run: python parser.py
        timeout-minutes: 4    # ← parser не може висіти більше 4 хвилин
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DEVTO_API_KEY:      ${{ secrets.DEVTO_API_KEY }}
          # GEMINI_API_KEY не передаємо — AI вимкнений поки не налагодимо

      - name: Save seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json pending.json || true
          git diff --staged --quiet || git commit -m "chore: update seen/pending [skip ci]"
          git push
